services:
  backend:
    build:
      context: ./apps
      dockerfile: server/Dockerfile
    container_name: warranty-backend
    env_file:
      - .env
    volumes:
      - ./apps/server/uploads:/app/server/uploads
    expose:
      - "8001"
    restart: unless-stopped
    networks:
      - warranty-net

  frontend:
    build:
      context: ./apps
      dockerfile: nginx/Dockerfile
    container_name: warranty-frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_HOST_PORT:-3001}:80"
    restart: unless-stopped
    networks:
      - warranty-net

networks:
  warranty-net:
    driver: bridge
