<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Sản phẩm</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../assets/app.css"/>
</head>
<body>
<div class="shell">
  <aside class="sidebar"></aside>
  <div class="main">
    <div class="topbar">
      <span class="topbar-title">Sản phẩm</span>
    </div>
    <div class="page">
      <div class="filter-bar mb-2">
        <input id="searchQ" class="form-control" placeholder="Tìm tên, SKU..." style="max-width:320px"/>
        <span id="count" class="text-sm text-muted" style="align-self:center"></span>
      </div>
      <div class="card">
        <div class="table-wrap">
          <table>
            <thead><tr><th>Tên sản phẩm</th><th>SKU</th><th>Odoo ID</th><th>Nguồn</th></tr></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
        <div id="loading" class="loading">Đang tải...</div>
        <div style="display:flex;justify-content:space-between;align-items:center;padding:.85rem 1rem;border-top:1px solid var(--border)">
          <div id="pageInfo" class="text-sm text-muted">—</div>
          <div style="display:flex;gap:.5rem">
            <button id="prevBtn" class="btn btn-secondary btn-sm" onclick="goPage(-1)">← Trước</button>
            <button id="nextBtn" class="btn btn-secondary btn-sm" onclick="goPage(1)">Sau →</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<div id="toast-container"></div>
<script src="../assets/api.js"></script>
<script src="../assets/layout.js"></script>
<script>
let debounce;
let page = 1;
const pageSize = 100;
document.getElementById("searchQ").addEventListener("input", () => {
  clearTimeout(debounce);
  debounce = setTimeout(() => {
    page = 1;
    load();
  }, 300);
});

async function load() {
  const q = document.getElementById("searchQ").value;
  const offset = (page - 1) * pageSize;
  const res = await api.get(`/api/products?q=${encodeURIComponent(q)}&limit=${pageSize}&offset=${offset}`);
  const products = Array.isArray(res) ? res : (res.items || []);
  const total = Array.isArray(res) ? products.length : (res.total || 0);
  document.getElementById("loading").style.display = "none";
  document.getElementById("count").textContent = `${total} sản phẩm`;
  document.getElementById("tbody").innerHTML = products.map(p => `
    <tr>
      <td><b>${p.name}</b></td>
      <td class="td-muted">${p.sku||"—"}</td>
      <td>${p.kiotviet_item_id ? `<span class="badge badge-teal">${p.kiotviet_item_id}</span>` : "—"}</td>
      <td>${p.kiotviet_synced
        ? '<span class="badge badge-teal">Odoo</span>'
        : '<span class="badge badge-gray">Nội bộ</span>'}</td>
    </tr>`).join("");
  const from = total ? offset + 1 : 0;
  const to = Math.min(offset + products.length, total);
  document.getElementById("pageInfo").textContent = `Hiển thị ${from}-${to} / ${total}`;
  document.getElementById("prevBtn").disabled = page <= 1;
  document.getElementById("nextBtn").disabled = offset + products.length >= total;
}

function goPage(delta) {
  page = Math.max(1, page + delta);
  load();
}
load().catch(e => toast(e.message,"error"));
</script>
</body>
</html>
