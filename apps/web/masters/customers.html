<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Khách hàng</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../assets/app.css"/>
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="sidebar-brand"><div class="logo">⚙ WARRANTY</div><div class="sub">Quản lý bảo hành</div></div>
    <nav>
      <div class="nav-group-label">Vận hành</div>
      <a class="nav-item" href="/index.html"><span class="icon">▦</span>Dashboard</a>
      <a class="nav-item" href="/tickets/list.html"><span class="icon">📋</span>Phiếu bảo hành</a>
      <a class="nav-item" href="/tickets/new.html"><span class="icon">＋</span>Tạo phiếu mới</a>
      <a class="nav-item" href="/supplier-orders/list.html"><span class="icon">🚚</span>Phiếu gửi NCC</a>
      <a class="nav-item" href="/supplier-receives/list.html"><span class="icon">📥</span>Phiếu nhận NCC</a>
      <div class="nav-group-label">Danh mục</div>
      <a class="nav-item" href="/masters/suppliers.html"><span class="icon">🏭</span>Nhà cung cấp</a>
      <a class="nav-item active" href="/masters/customers.html"><span class="icon">👤</span>Khách hàng</a>
      <a class="nav-item" href="/masters/products.html"><span class="icon">📦</span>Sản phẩm</a>
      <a class="nav-item" href="/admin/checklist-templates.html"><span class="icon">🧪</span>Mẫu checklist</a>
      <div class="nav-group-label">Tài chính</div>
      <a class="nav-item" href="/finance/report.html"><span class="icon">💰</span>Thu / Chi</a>
    </nav>
  </aside>
  <div class="main">
    <div class="topbar">
      <span class="topbar-title">Khách hàng</span>
    </div>
    <div class="page">
      <div class="filter-bar mb-2">
        <input id="searchQ" class="form-control" placeholder="Tìm tên, SĐT..." style="max-width:320px" oninput="load()"/>
        <button id="syncBtn" class="btn btn-secondary btn-sm" onclick="triggerSync()">Dong bo KiotViet</button>
        <span id="syncStatus" class="text-sm text-muted" style="align-self:center"></span>
      </div>
      <div class="card">
        <div class="table-wrap">
          <table>
            <thead><tr><th>Tên khách hàng</th><th>SĐT</th><th>Địa chỉ</th><th>KiotViet ID</th><th>Ngày tạo</th></tr></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
        <div id="loading" class="loading">Đang tải...</div>
      </div>
    </div>
  </div>
</div>
<div id="toast-container"></div>
<script src="../assets/api.js"></script>
<script>
let debounce;
document.getElementById("searchQ").addEventListener("input", () => {
  clearTimeout(debounce); debounce = setTimeout(load, 300);
});

async function load() {
  const q = document.getElementById("searchQ").value;
  const customers = await api.get(`/api/customers?q=${encodeURIComponent(q)}&limit=100`);
  document.getElementById("loading").style.display = "none";
  document.getElementById("tbody").innerHTML = customers.map(c => `
    <tr>
      <td><b>${c.name}</b></td>
      <td>${c.phone||"—"}</td>
      <td class="td-muted">${c.address||"—"}</td>
      <td>${c.kiotviet_id ? `<span class="badge badge-teal">${c.kiotviet_id}</span>` : '<span class="badge badge-gray">Nội bộ</span>'}</td>
      <td class="td-muted">${fmtDate(c.created_at?.slice(0,10))}</td>
    </tr>`).join("");
}

async function refreshSyncStatus() {
  try {
    const st = await api.get("/api/customers/sync/status");
    const c = st.customers?.last_success_at ? fmtDate(st.customers.last_success_at.slice(0,10)) : "chua";
    const p = st.products?.last_success_at ? fmtDate(st.products.last_success_at.slice(0,10)) : "chua";
    document.getElementById("syncStatus").textContent = `Sync KH: ${c} | SP: ${p}`;
  } catch {
    document.getElementById("syncStatus").textContent = "Khong doc duoc trang thai sync";
  }
}

async function triggerSync() {
  const btn = document.getElementById("syncBtn");
  btn.disabled = true;
  btn.textContent = "Dang sync...";
  try {
    await api.post("/api/customers/sync", {});
    toast("Da dong bo du lieu KiotViet");
    await Promise.all([load(), refreshSyncStatus()]);
  } catch (e) {
    toast(e.message, "error");
  } finally {
    btn.disabled = false;
    btn.textContent = "Dong bo KiotViet";
  }
}
Promise.all([load(), refreshSyncStatus()]).catch(e => toast(e.message,"error"));
</script>
</body>
</html>
